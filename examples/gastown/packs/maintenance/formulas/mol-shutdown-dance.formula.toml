description = """
Shutdown dance — due process for stuck agents.

Dispatched by filing a warrant bead with `--label=pool:dog`:

```bash
bd create --type=warrant \
  --title="Stuck: <agent>" \
  --metadata '{"target":"<session>","reason":"<reason>","requester":"<who>"}' \
  --label=pool:dog
```

The dog pool picks up the warrant and pours this formula. Each wisp is
one shutdown dance for one target. On crash, re-read formula steps and
resume from context (check target state, attempt history).

## State Machine

```
RECEIVE → INTERROGATE (1) → SOFT-RECOVER → INTERROGATE (2) → INTERROGATE (3) → EXECUTE → EPITAPH
              ↓                  ↓                ↓                  ↓
           ALIVE?           recovered?         ALIVE?             ALIVE?
              ↓                  ↓                ↓                  ↓
                       [yes at any step → EPITAPH with PARDONED]
                                                                     ↓
                                                                  [no → EXECUTE]
```

The cheap test (interrogate-1) runs *before* the cheap recovery (soft-recover)
because soft recovery is not free of side effects: on a healthy-but-idle Claude
session, sending `/rewind` opens a modal dialog that subsequent text nudges
can't dismiss. The alive-check nudge has zero side effects on a healthy agent,
so we use it as the cheapest possible test for "is recovery actually needed?"
and only escalate to soft recovery (which mutates conversation state) when the
test fails to elicit a response.

## Timeouts

| Step          | Timeout | Cumulative |
|---------------|---------|------------|
| interrogate-1 | 60s     | 60s        |
| soft-recover  | 60s     | 120s (2m)  |
| interrogate-2 | 120s    | 240s (4m)  |
| interrogate-3 | 240s    | 480s (8m)  |

## Who files warrants

| Detector | Stuck agent | Detection method |
|----------|-------------|-----------------|
| Deacon health-scan | Witness | Stale patrol wisp |
| Deacon health-scan | Refinery | Stale wisp + queue has work |
| Deacon utility-agent-health | Dog | Stale wisp/bead |
| Witness check-polecat-health | Polecat | Stale work bead, no progress |

No agent kills anything directly. The shutdown dance is the single
recovery mechanism for all stuck agents.

Read each step's description before acting — Config values override defaults."""
formula = "mol-shutdown-dance"
version = 1

[vars]
[vars.warrant_id]
description = "Bead ID of the warrant being processed (from metadata on the wisp)"
required = true

[vars.target]
description = "Session name of the agent to interrogate"
required = true

[vars.reason]
description = "Why the warrant was filed"
required = true

[vars.requester]
description = "Who filed the warrant (deacon, witness, etc.)"
default = "deacon"

[[steps]]
id = "receive-warrant"
title = "Validate warrant and confirm target alive"
description = """
Entry point. Read the warrant metadata from your wisp.

**1. Read warrant details:**
```bash
bd show <wisp-id> --json | jq '.metadata'
```
Extract: `target`, `reason`, `requester`, `warrant_id`.

**2. Verify the warrant bead exists and is open:**
```bash
bd show {{warrant_id}} --json | jq '.status'
```
If warrant is already closed (another dog handled it, or requester
cancelled): close this step, burn the wisp, exit.

**3. Check if target session is alive:**
```bash
gc session peek {{target}} 1
```
If target session doesn't exist (already dead):
- Close warrant: `bd close {{warrant_id}} --reason "Target already dead"`
- Send DOG_DONE mail to requester
- Burn this wisp, exit

**4. If target is alive:** close this step and proceed to interrogation."""

[[steps]]
id = "interrogate-1"
title = "First health check (60s timeout)"
needs = ["receive-warrant"]
description = """
First attempt to contact the stuck agent. Give it 60 seconds.

This is a pure liveness *test* with zero side effects: a text nudge
injected at an idle prompt is a no-op for a healthy agent (it reads
the message on its next turn and replies). We run this before any
recovery action so we never apply an unnecessary state-mutating
recovery to a healthy false-positive.

**1. Send health check via nudge:**
```bash
gc nudge {{target}} "[DOG] HEALTH CHECK: Respond ALIVE within 60s or face termination.
Warrant: {{warrant_id}}
Reason: {{reason}}
Filed by: {{requester}}
Attempt: 1/3"
```

**2. Wait 60 seconds:**
```bash
sleep 60
```

**3. Check for response:**
```bash
gc session peek {{target}} 50
```

Look for the ALIVE keyword in the output after your health check message.
Also check for any sign of active work (new tool calls, output being
generated). Use judgment — explicit "ALIVE" is definitive, but active
output also indicates the agent is functioning.

**4. If ALIVE or active:**
- Close warrant: `bd close {{warrant_id}} --reason "Session responded at attempt 1"`
- Send mail: `gc mail send {{requester}}/ -s "PARDON: {{target}}" -m "Responded after attempt 1"`
- Burn wisp, exit

**5. If no response:** close this step, proceed to soft-recover."""

[[steps]]
id = "soft-recover"
title = "Provider-aware soft recovery (60s timeout)"
needs = ["interrogate-1"]
description = """
Cheap, provider-aware soft recovery. Reached only when interrogate-1's
liveness test got no response, so we know recovery is actually needed
and we won't be mutating a healthy agent's state.

For Claude Code this delivers `/rewind`, which rolls the conversation
back to before the most recent broken turn (e.g. a 400 tool_use
concurrency error) without losing session, working-directory, or
in-flight tool state. Providers without a configured soft-recovery
hint emit a stderr marker and the ladder advances immediately.

**0. Skip when soft recovery cannot help:**
If `{{reason}}` is `wisp_stale`, the agent has stopped emitting wisps
for a non-context reason — soft recovery is unlikely to revive it,
and `/rewind` would just open a modal dialog the next steps can't
dismiss. Close this step without sending anything and proceed
directly to interrogate-2.

**1. Send the soft-recovery sequence:**
```bash
gc session recover {{target}} 2>&1 | tee /tmp/recover-{{warrant_id}}.log
```
Exit code 0 → keystrokes were delivered, proceed to step 2.
Non-zero AND stderr contains "no soft recovery; skipping" → the
provider has no soft rung (or the session has no resolved provider);
SKIP the wait in step 2 and advance immediately to interrogate-2.
Any other non-zero exit → delivery error (session not running,
send-keys failed); continue to step 4 anyway.

(Note: the gc CLI collapses all error exits to code 1, so the
"no soft rung available" signal is conveyed via the stderr marker,
not the exit code.)

**2. Wait 60 seconds for the agent to resume:**
```bash
sleep 60
```

**3. Check for resumed activity:**
```bash
gc session peek {{target}} 50
```
Soft-recovery success looks like fresh output from the agent after
`/rewind` (a new prompt, a resumed tool call, a new wisp written).
You do NOT need to see an explicit "ALIVE" — the absence of a stuck
error frame plus any forward progress is enough.

**4. If recovered:**
- Close warrant: `bd close {{warrant_id}} --reason "Soft recovery succeeded after alive-check failed"`
- Send mail: `gc mail send {{requester}}/ -s "PARDON: {{target}}" -m "Soft recovery (/rewind or equivalent) succeeded"`
- Burn wisp, exit

**5. If no recovery (or `gc session recover` exited 2):** close this
step, proceed to interrogate-2 — the harder nudge cycle."""

[[steps]]
id = "interrogate-2"
title = "Second health check (120s timeout)"
needs = ["soft-recover"]
description = """
Second attempt with longer timeout. Only reached if first attempt
got no response.

**1. Send health check:**
```bash
gc nudge {{target}} "[DOG] HEALTH CHECK: Respond ALIVE within 120s or face termination.
Warrant: {{warrant_id}}
Reason: {{reason}}
Filed by: {{requester}}
Attempt: 2/3"
```

**2. Wait 120 seconds:**
```bash
sleep 120
```

**3. Check for response:**
```bash
gc session peek {{target}} 50
```

Same evaluation as attempt 1: ALIVE keyword or active output.

**4. If ALIVE or active:**
- Close warrant: `bd close {{warrant_id}} --reason "Session responded at attempt 2"`
- Send mail: `gc mail send {{requester}}/ -s "PARDON: {{target}}" -m "Responded after attempt 2"`
- Burn wisp, exit

**5. If no response:** close this step, proceed to final interrogation."""

[[steps]]
id = "interrogate-3"
title = "Final health check (240s timeout)"
needs = ["interrogate-2"]
description = """
Final attempt before execution. 240 seconds — if the agent can't
respond in 4 minutes after 3 attempts, it's genuinely stuck.

**1. Send health check:**
```bash
gc nudge {{target}} "[DOG] HEALTH CHECK: FINAL WARNING. Respond ALIVE within 240s.
Warrant: {{warrant_id}}
Reason: {{reason}}
Filed by: {{requester}}
Attempt: 3/3 — session will be terminated if no response"
```

**2. Wait 240 seconds:**
```bash
sleep 240
```

**3. Check for response:**
```bash
gc session peek {{target}} 50
```

**4. If ALIVE or active:**
- Close warrant: `bd close {{warrant_id}} --reason "Session responded at attempt 3"`
- Send mail: `gc mail send {{requester}}/ -s "PARDON: {{target}}" -m "Responded after attempt 3 (close call)"`
- Burn wisp, exit

**5. If no response:** close this step, proceed to execute."""

[[steps]]
id = "execute"
title = "Execute warrant — kill session"
needs = ["interrogate-3"]
description = """
Three attempts, no response. Execute the warrant.

**1. Capture final pane output for forensics:**
```bash
gc session peek {{target}} 100
```
Save this output — it's the last evidence of what the agent was doing.

**2. Kill the session:**
```bash
gc session kill {{target}}
```
This kills the session directly. The reconciler will see the agent
has no running session and restart it on the next reconcile tick.

If the kill doesn't take effect (session already dead or provider
error), escalate:
```bash
gc mail send {{requester}}/ -s "EXECUTE_FAILED: {{target}}" \
  -m "session kill didn't take effect. Agent may need manual intervention."
```

**3. Record execution on the warrant:**
```bash
bd close {{warrant_id}} --reason "Executed after alive checks + soft recovery failed (480s total)"
```

Close this step, proceed to epitaph."""

[[steps]]
id = "epitaph"
title = "Log outcome, notify, and exit"
needs = ["execute"]
description = """
Final step. Create audit record and exit.

**1. Send DOG_DONE notification to requester:**
```bash
gc mail send {{requester}}/ -s "DOG_DONE: {{target}} warrant executed" \
  -m "Warrant: {{warrant_id}}
Target: {{target}}
Reason: {{reason}}
Outcome: EXECUTED after alive checks + soft recovery failed (60s + 60s + 120s + 240s = 480s)
Action: session killed, reconciler will restart"
```

**2. Close work bead (if separate from warrant):**
If your assigned work bead is different from the warrant bead, close it:
```bash
bd close <work-bead> --reason "Shutdown dance complete: {{target}} executed"
```

**3. Exit:**
```bash
gc runtime drain-ack
exit
```

The controller sees you as idle and can assign new work or recycle
your pool slot.

**Note:** The pardon path (ALIVE detected) exits early from the
interrogation steps and never reaches this step. This step only
handles the execution path."""
