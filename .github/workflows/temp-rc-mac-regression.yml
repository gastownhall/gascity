name: Temp RC Mac Regression

on:
  push:
    branches:
      - fix/rc-gate-macos-go-pin
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  cmd_gc_rc_regression:
    name: cmd/gc RC regression
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - macstadium
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.25.8"
      - name: Run focused mac RC regression tests
        run: |
          go test ./cmd/gc \
            -run 'TestCmdStopWaitsForStandaloneControllerExit|TestControllerReloadsNamedSessionModeAndAppliesIdleTimeout|TestControllerReloadsConfigImmediatelyOnWatchEvent' \
            -count=10 \
            -failfast \
            -v
