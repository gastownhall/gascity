name: Temp RC Mac Regression

on:
  push:
    branches:
      - fix/rc-gate-macos-go-pin
  workflow_dispatch:

permissions:
  contents: read

env:
  BD_COMMIT: 9d9d0e53c2330bd081bef350883f56c2557eb78b
  GOTOOLCHAIN: local

jobs:
  cmd_gc_rc_regression:
    name: cmd/gc RC regression
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - macstadium
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: gastownhall/beads
          ref: ${{ env.BD_COMMIT }}
          path: .beads-src
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.25.8"
      - name: Build pinned bd
        working-directory: ./.beads-src
        run: |
          mkdir -p "$HOME/.local/bin"
          GOBIN="$HOME/.local/bin" go install ./cmd/bd
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/bd" version
      - name: Run focused mac RC regression tests
        run: |
          go test ./cmd/gc \
            -run 'TestCmdStopWaitsForStandaloneControllerExit|TestControllerReloadsNamedSessionModeAndAppliesIdleTimeout|TestControllerReloadsConfigImmediatelyOnWatchEvent' \
            -count=10 \
            -failfast \
            -v
