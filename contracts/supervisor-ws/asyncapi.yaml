asyncapi: 2.6.0
id: urn:gascity:supervisor-websocket:v1alpha1
defaultContentType: application/json
info:
  title: Gas City Supervisor WebSocket Protocol
  version: 1.0.0
  description: >
    Shared websocket protocol for the city API server and supervisor mux at
    GET /v0/ws. The server sends hello/response/error/event envelopes. Clients
    send request envelopes.

    This spec is auto-generated from the Go type registry. Do not edit manually.
    Regenerate with: go generate ./internal/api/specgen/...
servers:
  city:
    url: localhost
    protocol: ws
    description: Per-city websocket endpoint.
  supervisor:
    url: localhost
    protocol: ws
    description: Supervisor websocket endpoint.
channels:
  /v0/ws:
    description: Bidirectional websocket channel for requests, responses, and subscriptions.
    publish:
      operationId: sendRequest
      message:
        $ref: '#/components/messages/RequestEnvelopeMessage'
    subscribe:
      operationId: receiveServerEnvelope
      message:
        oneOf:
          - $ref: '#/components/messages/HelloEnvelopeMessage'
          - $ref: '#/components/messages/ResponseEnvelopeMessage'
          - $ref: '#/components/messages/ErrorEnvelopeMessage'
          - $ref: '#/components/messages/EventEnvelopeMessage'
components:
  messages:
    HelloEnvelopeMessage:
      name: HelloEnvelope
      payload:
        $ref: '#/components/schemas/HelloEnvelope'
    RequestEnvelopeMessage:
      name: RequestEnvelope
      payload:
        $ref: '#/components/schemas/RequestEnvelope'
    ResponseEnvelopeMessage:
      name: ResponseEnvelope
      payload:
        $ref: '#/components/schemas/ResponseEnvelope'
    ErrorEnvelopeMessage:
      name: ErrorEnvelope
      payload:
        $ref: '#/components/schemas/ErrorEnvelope'
    EventEnvelopeMessage:
      name: EventEnvelope
      payload:
        $ref: '#/components/schemas/EventEnvelope'
  schemas:
    HelloEnvelope:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [hello]
        protocol:
          type: string
        server_role:
          type: string
          enum: [city, supervisor]
        read_only:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
    RequestEnvelope:
      type: object
      required: [type, id, action]
      properties:
        type:
          type: string
          enum: [request]
        id:
          type: string
        action:
          type: string
          enum:
            - agent.create
            - agent.delete
            - agent.get
            - agent.resume
            - agent.suspend
            - agent.update
            - agents.list
            - bead.assign
            - bead.close
            - bead.create
            - bead.delete
            - bead.deps
            - bead.get
            - bead.reopen
            - bead.update
            - beads.graph
            - beads.list
            - beads.ready
            - cities.list
            - city.get
            - city.patch
            - config.explain
            - config.get
            - config.validate
            - convoy.add
            - convoy.check
            - convoy.close
            - convoy.create
            - convoy.delete
            - convoy.get
            - convoy.remove
            - convoys.list
            - event.emit
            - events.list
            - extmsg.adapters.list
            - extmsg.adapters.register
            - extmsg.adapters.unregister
            - extmsg.bind
            - extmsg.bindings.list
            - extmsg.groups.ensure
            - extmsg.groups.lookup
            - extmsg.inbound
            - extmsg.outbound
            - extmsg.participant.remove
            - extmsg.participant.upsert
            - extmsg.transcript.ack
            - extmsg.transcript.list
            - extmsg.unbind
            - formula.get
            - formula.runs
            - formulas.feed
            - formulas.list
            - health.get
            - mail.archive
            - mail.count
            - mail.delete
            - mail.get
            - mail.list
            - mail.mark_unread
            - mail.read
            - mail.reply
            - mail.send
            - mail.thread
            - order.disable
            - order.enable
            - order.get
            - order.history.detail
            - orders.check
            - orders.feed
            - orders.history
            - orders.list
            - packs.list
            - patches.agent.delete
            - patches.agent.get
            - patches.agents.list
            - patches.agents.set
            - patches.provider.delete
            - patches.provider.get
            - patches.providers.list
            - patches.providers.set
            - patches.rig.delete
            - patches.rig.get
            - patches.rigs.list
            - patches.rigs.set
            - provider.create
