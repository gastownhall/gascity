            - status.get
            - subscription.start
            - subscription.stop
            - workflow.delete
            - workflow.get
        payload:
          type: object
          description: Action-specific request payload. Schema varies by action.
        scope:
          type: object
          properties:
            city:
              type: string
        idempotency_key:
          type: string
          description: Deduplication key for mutation replay.
        watch:
          type: object
          description: Blocking query parameters.
          properties:
            index:
              type: integer
              description: Block until server index exceeds this value.
            wait:
              type: string
              description: Maximum wait duration (e.g. '30s').
    ResponseEnvelope:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
          enum: [response]
        id:
          type: string
        index:
          type: integer
          description: Server event index for watch semantics.
        result:
          type: object
          description: Action-specific response payload.
    ErrorEnvelope:
      type: object
      required: [type, code, message]
      properties:
        type:
          type: string
          enum: [error]
        id:
          type: string
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    EventEnvelope:
      type: object
      required: [type, subscription_id]
      properties:
        type:
          type: string
          enum: [event]
        subscription_id:
          type: string
        event_type:
          type: string
        index:
          type: integer
        cursor:
          type: string
        payload:
          type: object
